<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Support Room</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
        
        body { 
            background: url('1.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
        }

        /* LOADER */
        #loadingScreen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            color: white; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #00d4ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* CHAT CONTAINER */
        .chat-container {
            max-width: 600px; height: 100vh; margin: auto; display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.85); border-left: 1px solid #333; border-right: 1px solid #333;
        }

        /* HEADER */
        .chat-header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }

        /* CHAT BOX */
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* MESSAGES */
        .message { 
            max-width: 80%; padding: 12px; border-radius: 18px; font-size: 16px; 
            animation: rollIn 0.3s ease-out forwards; opacity: 0;
        }
        @keyframes rollIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .sent { align-self: flex-end; background: #056162; color: white; }
        .received { align-self: flex-start; background: #222; color: white; border: 1px solid #444; }
        
        /* BUY MESSAGE STYLE */
        .buy { 
            align-self: center; background: linear-gradient(135deg, #ff4757, #ff7f50);
            color: white; font-weight: 800; width: 90%; text-align: center;
            border-radius: 20px; padding: 15px; font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            border: 2px solid white; margin: 10px 0; text-transform: uppercase;
        }

        .time { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }

        /* INPUT */
        .chat-input { display: flex; padding: 15px; background: #111; border-top: 1px solid #333; }
        .chat-input input { flex: 1; padding: 15px; border: none; border-radius: 30px; outline: none; font-size: 16px; }
        .chat-input button { margin-left: 10px; border: none; background: #075e54; color: white; border-radius: 50%; width: 50px; cursor: pointer; }
    </style>
</head>

<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <button onclick="history.back()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">←</button>
            <div id="userTitle">Chat Room</div>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input">
            <input id="messageInput" placeholder="Reply to customer...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSy...",
            authDomain: "happytails-50138.firebaseapp.com",
            projectId: "happytails-50138",
        }));

        const userId = new URLSearchParams(window.location.search).get("user");
        document.getElementById("userTitle").innerText = userId.toUpperCase();

        const messagesRef = collection(db, "chats", userId, "messages");
        const chatRef = doc(db, "chats", userId);
        const chatBox = document.getElementById("chatBox");
        const messageInput = document.getElementById("messageInput");

        /* RENDER MESSAGES */
        function render(d) {
            const div = document.createElement("div");
            const timeStr = new Date(d.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if(d.type === "buy"){
                div.className = "message buy";
                div.innerHTML = `🛒 ${d.text}<div class="time">${timeStr}</div>`;
            }
            else if(d.sender === "admin"){
                div.className = "message sent";
                div.innerHTML = `${d.text}<div class="time">${timeStr}</div>`;
            }
            else {
                div.className = "message received";
                div.innerHTML = `${d.text}<div class="time">${timeStr}</div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        /* LOAD REALTIME */
        onSnapshot(query(messagesRef, orderBy("time", "asc")), (snap) => {
            chatBox.innerHTML = "";
            snap.forEach(d => render(d.data()));
            document.getElementById("loadingScreen").style.display = "none";
        });

        /* SEND REPLY */
        window.sendMessage = async () => {
            const text = messageInput.value.trim();
            if(!text) return;
            const now = Date.now();

            await addDoc(messagesRef, { text, sender: "admin", time: now });

            // UPDATE INBOX SO IT SHOWS LATEST TEXT
            await updateDoc(chatRef, {
                lastMessage: text,
                lastTime: now,
                lastSender: "admin",
                lastType: "text" // Normal reply, not a cart buy
            });

            messageInput.value = "";
        };
    </script>
</body>
</html>
