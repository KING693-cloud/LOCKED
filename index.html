<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN DASHBOARD | SECURE CONTROL</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="2.jpg">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --neon-magenta: #FF00FF;
    --neon-cyan: #00FFFF;
    --neon-lime: #39FF14;
    --neon-gold: #FFD700;
}

body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background:url('2.jpg') center/cover fixed;
    color:white;
}

.overlay {
    min-height:100vh;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    padding:20px;
}

#login-overlay {
    position:fixed; inset:0; background:black; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:9999;
}

#pin-input {
    padding:15px; font-size:2rem; width:180px; text-align:center;
    border-radius:10px; border:2px solid var(--neon-magenta); background:#111; color:white;
}

#dashboard { display:none; max-width:700px; width:100%; text-align:center; }

.status {
    display:inline-block; padding:5px 15px; border:1px solid var(--neon-lime);
    color:var(--neon-lime); border-radius:20px; font-size:11px; margin-bottom:20px;
}

.btn-stack { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }

.admin-btn {
    padding:18px; border-radius:12px; border:1px solid rgba(255,255,255,0.2);
    text-decoration:none; color:white; background:rgba(0,0,0,0.4); position:relative; font-weight:bold;
    display: block;
}

.badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: red;
    color: white;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 8px;
    border-radius: 50%;
    display: none;
    box-shadow: 0 0 10px red;
}

.live-dot {
    width:10px; height:10px; background:lime; border-radius:50%; display:inline-block;
    margin-left:10px; animation:pulse 1s infinite;
}

@keyframes pulse { 0% {transform:scale(1); opacity:0.6;} 50% {transform:scale(1.3); opacity:1;} }

.box { margin-top:25px; padding:15px; background:rgba(255,255,255,0.05); border-radius:10px; text-align:left; }
footer { margin-top:30px; font-size:11px; opacity:0.5; }
</style>
</head>

<body>

<div id="login-overlay">
    <h1>ADMIN ACCESS</h1>
    <input id="pin-input" type="password" maxlength="4" placeholder="****">
</div>

<div class="overlay">
<div id="dashboard">
    <div class="status">SYSTEM ONLINE <span class="live-dot"></span></div>
    <h2>CONTROL PANEL</h2>

    <div class="btn-stack">
        <a href="gallery-edit.html" class="admin-btn">1. PET GALLERY</a>
        <a href="booking-edit.html" class="admin-btn">2. BOOKINGS</a>
        <a href="vet-edit.html" class="admin-btn">3. VET PARTNERS</a>
        <a href="receipt-gen.html" class="admin-btn">4. RECEIPTS</a>
        <a href="system-config.html" class="admin-btn">5. SYSTEM CONFIG</a>
        
        <a href="chat.html" id="chatBtn" class="admin-btn" style="border:1px solid var(--neon-cyan);">
            6. LIVE CHAT
            <span id="chatBadge" class="badge">0</span>
        </a>
    </div>

    <div class="box">
        <h3>System Overview</h3>
        <p>Active Users: 42</p>
        <p>Server Status: OPTIMAL</p>
    </div>

    <footer>ADMIN SYSTEM v2.0</footer>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAgdvRUcN5q6r6EkNzlPU6EdNblMNjlMzg",
  authDomain: "happytails-50138.firebaseapp.com",
  projectId: "happytails-50138",
});

const db = getFirestore(app);
const badge = document.getElementById("chatBadge");

/* PWA REGISTRATION */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

/* LOGIN LOGIC */
if (localStorage.getItem("admin_session_active") === "true") {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
}

document.getElementById("pin-input").oninput = (e) => {
    if(e.target.value === "2026") {
        localStorage.setItem("admin_session_active", "true");
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    }
};

/* REAL-TIME BADGE LOGIC */
onSnapshot(collection(db, "chats"), (snap) => {
    let unreadUsers = 0;
    const lastRead = localStorage.getItem("adminLastRead") || 0;

    snap.forEach(doc => {
        const data = doc.data();
        if (data.lastSender === "customer" && data.lastTime > lastRead) {
            unreadUsers++;
        }
    });

    if (unreadUsers > 0) {
        badge.style.display = "block";
        badge.innerText = unreadUsers;
    } else {
        badge.style.display = "none";
    }
});

document.getElementById("chatBtn").onclick = () => {
    localStorage.setItem("adminLastRead", Date.now());
    badge.style.display = "none";
};
</script>

</body>
</html>
